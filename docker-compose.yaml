services:
  postgres:
    image: postgres:17
    container_name: eteg_db
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: eteg
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U docker -d eteg']
      interval: 5s
      timeout: 5s
      retries: 10

  db_init:
    build:
      context: ./api
    container_name: eteg_db_init
    working_dir: /app
    env_file:
      - ./api/.env
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "pnpm install && pnpm db:generate && pnpm db:migrate && pnpm db:seed"
    restart: 'no'

  api:
    build:
      context: ./api
    container_name: eteg_api
    working_dir: /app
    env_file:
      - ./api/.env
    ports:
      - '3333:3333'
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      - postgres
    command: sh -c "pnpm install && pnpm run dev"

  web:
    build:
      context: ./web
    container_name: eteg_web
    working_dir: /app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  api_node_modules:
  web_node_modules:
