services:
  postgres:
    image: postgres:17
    container_name: eteg_db
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: eteg
    ports:
      - 5432:5432

  api:
    build: .
    container_name: eteg_api
    ports:
      - '3333:3333'
    env_file:
      - .env
    volumes:
      - .:/api
      - /api/node_modules
    depends_on:
      - postgres
    command: npm run dev

  db_init:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
    command: sh -c "pnpm db:generate && pnpm db:migrate && pnpm db:seed"
    restart: 'no'
